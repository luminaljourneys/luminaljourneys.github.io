name: Deploy to Firebase

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install firebase-tools
        run: npm install -g firebase-tools@15.22.2

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── Staging build (dev branch) ──────────────────────────────────────────
      - name: Build for Staging
        if: github.ref == 'refs/heads/dev'
        run: npm run build
        env:
          VITE_ENV: staging
          VITE_EDIT_MODE_ENABLED: 'true'
          VITE_EDIT_PASSWORD: ${{ secrets.VITE_EDIT_PASSWORD }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_MAILER_URL: ${{ secrets.VITE_MAILER_URL }}

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/dev'
        run: firebase deploy --only hosting:staging --project luminaljourneys --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"

      # ── Production build (main branch) ─────────────────────────────────────
      - name: Build for Production
        if: github.ref == 'refs/heads/main'
        run: npm run build
        env:
          VITE_ENV: production
          VITE_EDIT_MODE_ENABLED: 'false'
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_MAILER_URL: ${{ secrets.VITE_MAILER_URL }}

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: firebase deploy --only hosting:production --project luminaljourneys --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
